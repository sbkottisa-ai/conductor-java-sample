name: Endor Labs Full Scan (SCA, Secrets, Container)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  scan:
    permissions:
      security-events: write      # Upload SARIF to GitHub
      contents: read              # Checkout repo
      actions: read               # Required for private repos SARIF upload
      id-token: write             # Keyless auth with Endor Labs
      pull-requests: write        # PR comments for new policy violations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'microsoft'
          java-version: '21'

      - name: Build Package
        run: ./gradlew clean build -x test

      - name: Build container image
        run: |
          docker build \
            -t conductor-java-sample:${{ github.sha }} \
            -f docker/server/Dockerfile \
            .

      - name: Endor Labs Scan Pull Request (Full)
        if: github.event_name == 'pull_request'
        uses: endorlabs/github-action@v1  # Pin to a commit SHA in production
        with:
          namespace: 'example'                     # TODO: replace with your tenant namespace
          scan_dependencies: true                  # SCA with pre-computed reachability
          scan_secrets: true                       # Secrets scan
          scan_container: true                     # Container + OS scan
          image: 'conductor-java-sample:${{ github.sha }}'
          pr: true
          enable_pr_comments: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

  scan-main:
    permissions:
      id-token: write
      repository-projects: read
      pull-requests: read
      contents: read
      security-events: write
      actions: read
    name: endorctl-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'microsoft'
          java-version: '21'

      - name: Build Package
        run: ./gradlew clean build -x test

      - name: Build container image
        run: |
          docker build \
            -t conductor-java-sample:${{ github.sha }} \
            -f docker/server/Dockerfile \
            .

      - name: Endor Labs Scan Push to main (Full)
        if: ${{ github.event_name == 'push' }}
        uses: endorlabs/github-action@v1  # Pin to a commit SHA in production
        with:
          namespace: 'example'                    # TODO: replace with your tenant namespace
          scan_dependencies: true
          scan_secrets: true
          scan_container: true
          image: 'conductor-java-sample:${{ github.sha }}'
          pr: false
          scan_summary_output_type: 'table'
          sarif_file: 'findings.sarif'

      - name: Upload findings to GitHub
        if: ${{ github.event_name == 'push' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'findings.sarif'
